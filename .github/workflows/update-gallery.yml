name: Update Gallery Manifest

on:
  push:
    paths:
      - 'media/gallery/**'

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate manifest.json
        run: node generate-gallery.js

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add media/gallery/manifest.json
          git diff --cached --quiet || git commit -m "chore: update gallery manifest"
          git push
